<div class="w-full h-full overflow-hidden flex flex-col">
  <nz-table
    nzSize="default"
    [nzLoading]="false"
    [nzBordered]="false"
    [nzShowQuickJumper]="false"
    [nzShowSizeChanger]="false"
    [nzHideOnSinglePage]="true"
    [nzShowPagination]="false"
    class="rank-table-header rhv-padding-4-top w-full overflow-hidden"
    [class.hidden]="!rhShowHeader"
    [nzTemplateMode]="true"
  >
    <thead>
      <tr>
        <ng-container *ngIf="rhShowRank">
          <th nzWidth="4rem" class="rhv-text-center">#</th>
        </ng-container>
        <th
          *ngFor="let col of rhColumns; trackBy: headTrackBy"
          [nzWidth]="col.width"
        >
          {{ col.name }}
        </th>
      </tr>
    </thead>
  </nz-table>
  <div class="w-full h-full overflow-hidden">
    <nz-table
      #table
      nzSize="default"
      [nzLoading]="false"
      [nzBordered]="false"
      [nzShowQuickJumper]="false"
      [nzShowSizeChanger]="false"
      [nzHideOnSinglePage]="true"
      [nzShowPagination]="false"
      nzTableLayout="fixed"
      class="rank-table w-full overflow-hidden"
      [nzTemplateMode]="true"
    >
      <thead>
        <tr class="hidden">
          <ng-container *ngIf="rhShowRank">
            <th nzWidth="4rem" class="rhv-text-center">#</th>
          </ng-container>
          <th
            *ngFor="let col of rhColumns; trackBy: headTrackBy"
            [nzWidth]="col.width"
          >
            {{ col.name }}
          </th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of visibleData; trackBy: trackBy">
          <ng-container *ngIf="rhShowRank">
            <td>
              <div class="rank-symbol">{{ row.rank }}</div>
              <!--  <ng-container [ngTemplateOutlet]="rankIconTpl"></ng-container> -->
            </td>
          </ng-container>
          <td
            *ngFor="let col of rhColumns; trackBy: headTrackBy"
            [ngStyle]="{ color: col.color, backgroundColor: col.bgColor }"
          >
            <ng-container
              [ngTemplateOutlet]="
                col.custom ? rhTemplates[col.templateKey] : basicTpl
              "
              [ngTemplateOutletContext]="{ row: row, col: col }"
            ></ng-container>
          </td>
        </tr>
      </tbody>
    </nz-table>
    <ng-template #basicTpl let-row="row" let-col="col">
      {{ row.rawData[col.key] }}
    </ng-template>
  </div>
</div>
<ng-template #rankIconTpl>

    xmlns="http://www.w3.org/2000/svg"

        height="24"

        x="10.5"

        height="23"
        rx="11.5"
        stroke="url(#paint0_linear_1660_5950)"

      <path
