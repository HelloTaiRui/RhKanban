<div class="ruler">
  <div class="label-row">
    <div class="item" *ngFor="let item of ticks; trackBy: trackByIndex">
      <div class="label" *ngIf="item != ''">{{ item }}</div>
    </div>
  </div>
  <div class="tick-row">
    <div class="item" *ngFor="let item of ticks; trackBy: trackByIndex">
      <div class="tick"></div>
    </div>
  </div>
</div>
