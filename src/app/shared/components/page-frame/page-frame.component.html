<div
  class="flex flex-col w-full h-full page-frame-main-wrapper"
  style.background-image="url({{ rhBgImg }})"
>
  <div class="flex w-full relative rhv-margin-2-half-bottom">
    <img src="{{ rhHeaderImg }}" width="100%" height="100%" />
    <div class="absolute w-full h-4/5 left-0 top-0 flex justify-between">
      <div class="w-1/4 board-left-area">
        <div class="label flex flex-col rhv-margin-8-right">
          <div>浙江省</div>
          <div>宁波余姚市</div>
        </div>
        <div class="divider rhv-margin-8-right"></div>
        <img
          src="assets/img/biyi/天气.png"
          alt=""
          style="height: var(--rhv-size-10)"
        />
      </div>
      <div
        class="w-1/2 board-title"
        [class.cursor-pointer]="rhCenterTitleClicked"
        (click)="rhCenterTitleClicked()"
      >
        {{ rhTitle }}
      </div>
      <div class="w-1/4 board-right-area">
        <span class="rhv-margin-8-right">{{ rightTitle$ | async }}</span>
        <div class="divider rhv-margin-8-right"></div>
        <div class="label flex flex-col">
          <div>{{ weekday }}</div>
          <div>{{ date }}</div>
        </div>
      </div>
    </div>
  </div>
  <div class="w-full h-full overflow-hidden flex-1" [ngClass]="rhBodyNgClass">
    <ng-content></ng-content>
  </div>
</div>
